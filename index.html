<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0faff; 
    }

    .card {
      width: 300px;
      padding: 40px;
      background-color: #ffed6f; 
      text-align: center;
      border: 5px dashed #ffffff; 
      border-radius: 20px;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
      transition: transform 0.5s; 
      cursor: pointer;
    }

    .card:hover {
      transform: rotate(9deg); 
    }

    h1 {
      color: #ff6b6b;
      font-family: 'Arial', sans-serif;
      margin: 0;
    }

  </style>
</head>
<body>

  <div class="card">
    <h1>Thank You</h1>
    <p>Cảm ơn cô Thơm vì 3 năm gắn bó !</p>
  </div>

</body>
</html>
